<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ernährungs-Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0f;
      --surface: #131318;
      --surface2: #1c1c24;
      --border: #26262f;
      --accent: #00e5a0;
      --accent2: #ff6584;
      --green: #00e5a0;
      --yellow: #f0b429;
      --red: #f03e3e;
      --text: #eeeef2;
      --text2: #5a5a72;
      --radius: 2px;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    #root { display: flex; min-height: 100vh; }

    /* Layout */
    .sidebar { width: 200px; background: var(--bg); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-logo { padding: 0 20px 28px; font-size: 15px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500; transition: all 0.15s; }
    .nav-item:hover { color: var(--text); }
    .nav-item.active { color: var(--accent); border-right: 2px solid var(--accent); }
    .main { flex: 1; overflow-y: auto; padding: 32px; max-width: 1100px; }
    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

    /* Stat cards */
    .stat-value { font-size: 32px; font-weight: 700; }
    .stat-label { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .stat-sub { font-size: 12px; color: var(--text2); margin-top: 8px; }

    /* Progress bar */
    .progress-wrap { background: var(--surface2); border-radius: 2px; height: 8px; margin-top: 12px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 2px; transition: width 0.3s; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.15s; letter-spacing: 0.2px; }
    .btn-primary { background: var(--accent); color: #0c0c0f; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover { background: var(--red); color: white; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 6px; }

    /* Forms */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
    input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }
    textarea { resize: vertical; min-height: 80px; }

    /* Tags/Badges */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 2px; font-size: 12px; font-weight: 500; }
    .badge-green { background: rgba(67,233,123,0.15); color: var(--green); }
    .badge-yellow { background: rgba(249,202,36,0.15); color: var(--yellow); }
    .badge-red { background: rgba(255,107,107,0.15); color: var(--red); }
    .badge-accent { background: rgba(108,99,255,0.15); color: var(--accent); }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 12px; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* Misc */
    .row { display: flex; align-items: center; gap: 12px; }
    .row-between { display: flex; align-items: center; justify-content: space-between; }
    .gap-8 { gap: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-24 { margin-bottom: 24px; }
    .text-sm { font-size: 13px; }
    .text-muted { color: var(--text2); }
    .empty { text-align: center; padding: 40px; color: var(--text2); }
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 2px; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .macro-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .macro-chip { background: var(--surface2); border-radius: 2px; padding: 4px 8px; font-size: 12px; color: var(--text2); }
    .macro-chip span { color: var(--text); font-weight: 600; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .day-col { background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .day-header { padding: 8px; text-align: center; font-size: 12px; font-weight: 600; color: var(--text2); background: var(--surface); border-bottom: 1px solid var(--border); }
    .meal-slot { padding: 8px; min-height: 70px; border-bottom: 1px solid var(--border); }
    .meal-slot:last-child { border-bottom: none; }
    .meal-slot-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .meal-entry { background: var(--surface); border-radius: 2px; padding: 6px 8px; font-size: 11px; margin-bottom: 4px; cursor: pointer; border: 1px solid var(--border); }
    .meal-entry:hover { border-color: var(--accent); }
    .add-meal-btn { width: 100%; padding: 4px; background: none; border: 1px dashed var(--border); border-radius: 2px; color: var(--text2); font-size: 11px; cursor: pointer; }
    .add-meal-btn:hover { border-color: var(--accent); color: var(--accent); }
    .shopping-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .shopping-item:last-child { border-bottom: none; }
    .shopping-check { width: 20px; height: 20px; border-radius: 2px; border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .shopping-check.checked { background: var(--green); border-color: var(--green); }
    .shopping-item.done .item-name { text-decoration: line-through; color: var(--text2); }

    /* ── Mobile responsive ────────────────────────────────────────── */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 58px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 50;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .bottom-nav-item {
      flex: 1; min-width: 48px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; cursor: pointer; color: var(--text2);
      font-size: 9px; font-weight: 500; letter-spacing: 0.3px;
      padding: 6px 4px; -webkit-tap-highlight-color: transparent;
    }
    .bottom-nav-item.active { color: var(--accent); }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .main { padding: 16px 14px 72px; }
      .bottom-nav { display: flex; }
      /* Grids → single column */
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr !important; }
      /* Dashboard 2-col grid */
      .dashboard-grid { grid-template-columns: 1fr !important; }
      /* Phase selector → wrap */
      .phase-selector { flex-wrap: wrap !important; }
      .phase-selector > div { flex: 1 1 100% !important; }
      /* Plan setup athlete inputs → stack */
      .athlete-name-row { flex-direction: column !important; }
      /* Wochenplan → horizontal scroll */
      .week-grid { grid-template-columns: repeat(7, minmax(130px, 1fr)) !important; overflow-x: auto; }
      .week-grid-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      /* Input touch targets */
      input, select, textarea { padding: 12px; font-size: 16px; } /* 16px prevents iOS zoom */
      .btn { min-height: 44px; }
      /* Modal full screen on mobile */
      .modal { max-height: 95vh; margin: 0; border-radius: 0; }
      .modal-overlay { padding: 0; align-items: flex-end; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Storage ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'ernaehrungs_tracker_v1';

const defaultData = {
  settings: { kalorienziel: 2000, proteinZiel: 120, kohlenhydrateZiel: 200, fettZiel: 65 },
  lebensmittel: [
    { id: 1, name: 'Hähnchenbrustfilet', kategorie: 'Protein', kalorien: 165, protein: 31, kh: 0, fett: 3.6, einheit: 'g' },
    { id: 2, name: 'Weißer Reis (gekocht)', kategorie: 'Kohlenhydrate', kalorien: 130, protein: 2.7, kh: 28, fett: 0.3, einheit: 'g' },
    { id: 3, name: 'Nudeln (gekocht)', kategorie: 'Kohlenhydrate', kalorien: 158, protein: 5.8, kh: 31, fett: 0.9, einheit: 'g' },
    { id: 4, name: 'Butter', kategorie: 'Fette', kalorien: 717, protein: 0.9, kh: 0.1, fett: 81, einheit: 'g' },
    { id: 5, name: 'Ei', kategorie: 'Protein', kalorien: 155, protein: 13, kh: 1.1, fett: 11, einheit: 'g' },
  ],
  rezepte: [
    {
      id: 1, name: 'Hähnchen mit Reis', beschreibung: 'Einfach & lecker',
      zutaten: [{ lmId: 1, menge: 200 }, { lmId: 2, menge: 200 }],
      anleitung: '1. Hähnchen würzen und braten.\n2. Reis kochen.\n3. Zusammen servieren.',
      portionen: 1
    }
  ],
  mahlzeitenplan: {},
  einkaufsliste: [],
  training: { uebungen: [], sessions: [] },
  gewichtsverlauf: [],
};

// Hilfsfunktionen für Import-Validierung
const _str = (v, max = 200) => typeof v === 'string' ? v.slice(0, max) : '';
const _num = (v) => typeof v === 'number' && isFinite(v) ? v : 0;
const _bool = (v, def = false) => v === true || v === false ? v : def;
const _arr = (v) => Array.isArray(v) ? v : [];
const _obj = (v) => (v && typeof v === 'object' && !Array.isArray(v)) ? v : null;
const _date = (v) => /^\d{4}-\d{2}-\d{2}$/.test(v) ? v : null;

// Validiert importierte JSON-Daten streng — nur bekannte Felder, keine Fremddaten
function validateImport(raw) {
  if (!_obj(raw)) throw new Error('Ungültiges Dateiformat');
  const out = JSON.parse(JSON.stringify(defaultData)); // deep copy als Basis

  if (_obj(raw.settings)) {
    const s = raw.settings;
    out.settings = {
      kalorienziel: _num(s.kalorienziel) || 2000,
      proteinZiel:  _num(s.proteinZiel)  || 120,
      kohlenhydrateZiel: _num(s.kohlenhydrateZiel) || 200,
      fettZiel:     _num(s.fettZiel)     || 65,
    };
  }

  if (Array.isArray(raw.lebensmittel)) {
    out.lebensmittel = raw.lebensmittel
      .filter(l => _obj(l) && l.name)
      .slice(0, 500)
      .map(l => ({
        id: _num(l.id) || Date.now(),
        name: _str(l.name, 100),
        kategorie: _str(l.kategorie, 50),
        kalorien: _num(l.kalorien),
        protein:  _num(l.protein),
        kh:       _num(l.kh),
        fett:     _num(l.fett),
        einheit:  _str(l.einheit, 10) || 'g',
      }));
  }

  if (Array.isArray(raw.rezepte)) {
    out.rezepte = raw.rezepte
      .filter(r => _obj(r) && r.name)
      .slice(0, 200)
      .map(r => ({
        id: _num(r.id) || Date.now(),
        name: _str(r.name, 100),
        beschreibung: _str(r.beschreibung, 500),
        anleitung: _str(r.anleitung, 2000),
        portionen: _num(r.portionen) || 1,
        zutaten: _arr(r.zutaten).slice(0, 50).map(z => ({
          lmId: _num(z.lmId),
          menge: _num(z.menge),
        })),
      }));
  }

  if (_obj(raw.mahlzeitenplan)) {
    out.mahlzeitenplan = {};
    const VALID_SLOTS = new Set(['Frühstück', 'Mittagessen', 'Abendessen', 'Snack']);
    for (const [date, slots] of Object.entries(raw.mahlzeitenplan).slice(0, 730)) {
      if (!_date(date)) continue;
      if (!_obj(slots)) continue;
      out.mahlzeitenplan[date] = {};
      for (const [slot, entries] of Object.entries(slots)) {
        if (!VALID_SLOTS.has(slot)) continue;
        out.mahlzeitenplan[date][slot] = _arr(entries).slice(0, 20).map(e => ({
          type: e.type === 'rezept' ? 'rezept' : 'lm',
          id:   _num(e.id),
          menge: _num(e.menge),
        }));
      }
    }
  }

  if (Array.isArray(raw.einkaufsliste)) {
    out.einkaufsliste = raw.einkaufsliste.slice(0, 200).map(e => ({
      id:   _num(e.id) || Date.now(),
      name: _str(e.name, 100),
      menge: _str(e.menge, 50),
      done: _bool(e.done),
    }));
  }

  if (Array.isArray(raw.gewichtsverlauf)) {
    out.gewichtsverlauf = raw.gewichtsverlauf
      .filter(e => _obj(e) && _date(e.datum))
      .slice(0, 1000)
      .map(e => ({ datum: e.datum, kg: _num(e.kg) }));
  }

  if (_obj(raw.training)) {
    const t = raw.training;
    const VALID_KAT = new Set(['Drücken','Ziehen','Athletik','Beine','Zusatz','Sonstiges']);
    out.training = {
      uebungen: _arr(t.uebungen).filter(u => _obj(u) && u.name).slice(0, 50).map(u => ({
        id:   _num(u.id) || Date.now(),
        name: _str(u.name, 100),
        kat:  VALID_KAT.has(u.kat) ? u.kat : _str(u.kat || u.muskel, 50) || 'Sonstiges',
        aktiv: _bool(u.aktiv !== false ? true : false, true),
      })),
      sessions: _arr(t.sessions).slice(0, 500).map(s => {
        const sanitizeLogs = (logs) => _arr(logs).slice(0, 50).map(l => ({
          uebungId: _num(l.uebungId),
          target: l.target != null ? _num(l.target) : null,
          sets: _arr(l.sets).slice(0, 20).map(x => ({
            kg:   _str(String(x.kg ?? ''), 10),
            reps: _str(String(x.reps ?? ''), 10),
          })),
        }));
        return {
          date:     _str(s.date, 50),
          savedAt:  _num(s.savedAt),
          phaseIdx: _num(s.phaseIdx),
          week:     _num(s.week),
          // Neues Format: athleteLogs; altes Format: logs (Legacy)
          ...(s.athleteLogs ? { athleteLogs: _arr(s.athleteLogs).slice(0, 4).map(sanitizeLogs) } : {}),
          ...(s.logs && !s.athleteLogs ? { logs: sanitizeLogs(s.logs) } : {}),
        };
      }),
      plan: _obj(t.plan) ? (() => {
        const p = t.plan;
        const startDate = _date(p.startDate) || new Date().toISOString().split('T')[0];
        const athletes = _arr(p.athletes)
          .filter(a => _obj(a) && a.name)
          .slice(0, 4)
          .map(a => ({
            name: _str(a.name, 50),
            rm1: _obj(a.rm1)
              ? Object.fromEntries(
                  Object.entries(a.rm1)
                    .filter(([k]) => /^\d+$/.test(k))
                    .slice(0, 50)
                    .map(([k, v]) => [k, _num(v)])
                )
              : {},
          }));
        // Legacy: rm1 direkt im Plan → athletes-Array
        if (!athletes.length && _obj(p.rm1)) {
          athletes.push({ name: 'Ich', rm1: Object.fromEntries(
            Object.entries(p.rm1).filter(([k]) => /^\d+$/.test(k)).slice(0, 50).map(([k, v]) => [k, _num(v)])
          )});
        }
        return {
          phaseIdx:  Math.max(0, Math.min(2, _num(p.phaseIdx))),
          startDate,
          athletes,
        };
      })() : null,
    };
  }

  return out;
}

function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return { ...defaultData, ...JSON.parse(s) };
  } catch {}
  return defaultData;
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ─── Helpers ───────────────────────────────────────────────────────────────
function calcRezeptNaehrwerte(rezept, lebensmittel) {
  let kal = 0, prot = 0, kh = 0, fett = 0;
  for (const z of rezept.zutaten) {
    const lm = lebensmittel.find(l => l.id === z.lmId);
    if (!lm) continue;
    const f = z.menge / 100;
    kal += lm.kalorien * f;
    prot += lm.protein * f;
    kh += lm.kh * f;
    fett += lm.fett * f;
  }
  const p = rezept.portionen || 1;
  return { kalorien: kal/p, protein: prot/p, kh: kh/p, fett: fett/p };
}

function getWeekDates(offset = 0) {
  const today = new Date();
  const day = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toISOString().split('T')[0];
  });
}

const WOCHENTAGE = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
const MAHLZEITEN = ['Frühstück', 'Mittagessen', 'Abendessen', 'Snack'];
const KATEGORIEN = ['Protein', 'Kohlenhydrate', 'Gemüse', 'Obst', 'Fette', 'Milchprodukte', 'Sonstiges'];

// ─── Icons (SVG inline) ────────────────────────────────────────────────────
const Icon = ({ name, size = 16 }) => {
  const icons = {
    home: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    food: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>,
    recipe: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
    calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
    cart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>,

    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,

    edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,

    chevLeft: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>,
    chevRight: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>,
    dumbbell: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="10" width="4" height="4" rx="1"/><rect x="18" y="10" width="4" height="4" rx="1"/><rect x="6" y="8" width="3" height="8" rx="1"/><rect x="15" y="8" width="3" height="8" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/></svg>,
    calc: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="14" y1="18" x2="16" y2="18"/></svg>,
  };
  return icons[name] || null;
};

// ─── Macro Bar ─────────────────────────────────────────────────────────────
function MacroBar({ label, value, max, color }) {
  const pct = Math.min(100, max > 0 ? (value / max) * 100 : 0);
  const over = value > max;
  return (
    <div style={{ marginBottom: 12 }}>
      <div className="row-between">
        <span className="text-sm">{label}</span>
        <span className="text-sm" style={{ color: over ? 'var(--red)' : 'var(--text2)' }}>
          {Math.round(value)}g / {max}g
        </span>
      </div>
      <div className="progress-wrap">
        <div className="progress-bar" style={{ width: `${pct}%`, background: over ? 'var(--red)' : color }} />
      </div>
    </div>
  );
}

// ─── Dashboard ─────────────────────────────────────────────────────────────
function Dashboard({ data, setData }) {
  const today = new Date().toISOString().split('T')[0];
  const [gewichtInput, setGewichtInput] = React.useState('');

  const gewichtsverlauf = data.gewichtsverlauf || [];
  const todayWeight = gewichtsverlauf.find(e => e.datum === today);

  const logGewicht = () => {
    if (!gewichtInput || isNaN(+gewichtInput)) return;
    const existing = gewichtsverlauf.filter(e => e.datum !== today);
    setData(d => ({ ...d, gewichtsverlauf: [...existing, { datum: today, kg: +gewichtInput }].sort((a,b) => a.datum.localeCompare(b.datum)) }));
    setGewichtInput('');
  };
  const todayMeals = data.mahlzeitenplan[today] || {};

  let totalKal = 0, totalProt = 0, totalKh = 0, totalFett = 0;
  for (const slot of Object.values(todayMeals)) {
    for (const entry of (slot || [])) {
      if (entry.type === 'rezept') {
        const rez = data.rezepte.find(r => r.id === entry.id);
        if (rez) {
          const n = calcRezeptNaehrwerte(rez, data.lebensmittel);
          totalKal += n.kalorien * entry.menge;
          totalProt += n.protein * entry.menge;
          totalKh += n.kh * entry.menge;
          totalFett += n.fett * entry.menge;
        }
      } else if (entry.type === 'lm') {
        const lm = data.lebensmittel.find(l => l.id === entry.id);
        if (lm) {
          const f = entry.menge / 100;
          totalKal += lm.kalorien * f;
          totalProt += lm.protein * f;
          totalKh += lm.kh * f;
          totalFett += lm.fett * f;
        }
      }
    }
  }

  const { kalorienziel, proteinZiel, kohlenhydrateZiel, fettZiel } = data.settings;
  const kalPct = Math.min(100, (totalKal / kalorienziel) * 100);
  const remaining = kalorienziel - totalKal;

  const todayStr = new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });

  const stunde = new Date().getHours();
  const tagesgruss = stunde < 11 ? 'Guten Morgen' : stunde < 17 ? 'Guten Tag' : 'Guten Abend';
  const kalFarbe = kalPct > 100 ? 'var(--red)' : kalPct > 85 ? 'var(--yellow)' : 'var(--accent)';

  return (
    <div>
      {/* Header */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ fontSize: 13, color: 'var(--text2)', marginBottom: 6 }}>{todayStr}</div>
        <div style={{ fontSize: 28, fontWeight: 700 }}>{tagesgruss}</div>
      </div>

      {/* Haupt-Layout: Kalorien groß links, Mahlzeiten rechts */}
      <div className="dashboard-grid" style={{ display: 'grid', gridTemplateColumns: '1fr 1.4fr', gap: 16, marginBottom: 16, alignItems: 'start' }}>

        {/* Kalorien-Block */}
        <div className="card">
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Heute gegessen</div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
              <span style={{ fontSize: 52, fontWeight: 800, color: kalFarbe, lineHeight: 1 }}>{Math.round(totalKal)}</span>
              <span style={{ fontSize: 16, color: 'var(--text2)' }}>/ {kalorienziel} kcal</span>
            </div>
            {remaining >= 0
              ? <div style={{ fontSize: 13, color: 'var(--text2)', marginTop: 6 }}>noch {Math.round(remaining)} kcal übrig</div>
              : <div style={{ fontSize: 13, color: 'var(--red)', marginTop: 6 }}>{Math.round(Math.abs(remaining))} kcal über Ziel</div>
            }
          </div>

          {/* Fortschrittsring als einfacher Balken */}
          <div style={{ background: 'var(--surface2)', borderRadius: 2, height: 6, marginBottom: 24, overflow: 'hidden' }}>
            <div style={{ height: '100%', borderRadius: 2, width: `${kalPct}%`, background: kalFarbe, transition: 'width 0.4s' }} />
          </div>

          {/* Makros kompakt */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {[
              { label: 'Protein', value: totalProt, max: proteinZiel, color: 'var(--accent)' },
              { label: 'Kohlenhydrate', value: totalKh, max: kohlenhydrateZiel, color: 'var(--yellow)' },
              { label: 'Fett', value: totalFett, max: fettZiel, color: 'var(--red)' },
            ].map(({ label, value, max, color }) => {
              const pct = Math.min(100, max > 0 ? (value / max) * 100 : 0);
              return (
                <div key={label}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: 4 }}>
                    <span style={{ color: 'var(--text2)' }}>{label}</span>
                    <span style={{ color: value > max ? 'var(--red)' : 'var(--text2)' }}>{Math.round(value)}g</span>
                  </div>
                  <div style={{ background: 'var(--surface2)', borderRadius: 2, height: 4, overflow: 'hidden' }}>
                    <div style={{ height: '100%', borderRadius: 2, width: `${pct}%`, background: color }} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Mahlzeiten heute */}
        <div className="card">
          <div style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 16, textTransform: 'uppercase', letterSpacing: '0.5px' }}>Mahlzeiten heute</div>
          {MAHLZEITEN.every(m => !(todayMeals[m] || []).length) ? (
            <div style={{ color: 'var(--text2)', fontSize: 14, padding: '8px 0' }}>
              Noch nichts eingetragen. Trag deine Mahlzeiten im Wochenplan ein.
            </div>
          ) : (
            MAHLZEITEN.map(m => {
              const entries = todayMeals[m] || [];
              if (!entries.length) return null;
              return (
                <div key={m} style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 11, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>{m}</div>
                  {entries.map((e, i) => {
                    let name = '', kcal = 0;
                    if (e.type === 'rezept') {
                      const r = data.rezepte.find(x => x.id === e.id);
                      if (r) { name = r.name; const n = calcRezeptNaehrwerte(r, data.lebensmittel); kcal = Math.round(n.kalorien * e.menge); }
                    } else {
                      const l = data.lebensmittel.find(x => x.id === e.id);
                      if (l) { name = l.name; kcal = Math.round(l.kalorien * e.menge / 100); }
                    }
                    return (
                      <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '5px 0', borderBottom: '1px solid var(--border)', fontSize: 14 }}>
                        <span>{name}</span>
                        <span style={{ color: 'var(--text2)' }}>{kcal} kcal</span>
                      </div>
                    );
                  })}
                </div>
              );
            })
          )}
        </div>
      </div>

      {/* Körpergewicht */}
      {(() => {
        const recent = gewichtsverlauf.slice(-10);
        const hasHistory = recent.length > 1;
        const first = hasHistory ? recent[0].kg : null;
        const last = hasHistory ? recent[recent.length - 1].kg : null;
        const diff = hasHistory ? +(last - first).toFixed(1) : null;
        const minKg = hasHistory ? Math.min(...recent.map(e => e.kg)) - 1 : 0;
        const maxKg = hasHistory ? Math.max(...recent.map(e => e.kg)) + 1 : 100;
        const W = 300, H = 60;
        const px = (i) => (i / (recent.length - 1)) * W;
        const py = (kg) => H - ((kg - minKg) / (maxKg - minKg)) * H;
        const points = recent.map((e, i) => `${px(i)},${py(e.kg)}`).join(' ');
        return (
          <div className="card" style={{ marginTop: 0 }}>
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 6 }}>Körpergewicht</div>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
                <div>
                  {last != null ? (
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
                      <span style={{ fontSize: 32, fontWeight: 800 }}>{last}</span>
                      <span style={{ fontSize: 14, color: 'var(--text2)' }}>kg</span>
                      {diff !== null && <span style={{ fontSize: 13, color: diff <= 0 ? 'var(--accent)' : 'var(--red)', fontWeight: 600 }}>{diff > 0 ? '+' : ''}{diff}kg</span>}
                    </div>
                  ) : (
                    <div style={{ fontSize: 13, color: 'var(--text2)' }}>Noch kein Eintrag</div>
                  )}
                </div>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                  <input type="number" placeholder={todayWeight ? `${todayWeight.kg}` : 'kg'} value={gewichtInput}
                    onChange={e => setGewichtInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && logGewicht()}
                    style={{ width: 80 }} />
                  <button className="btn btn-primary" onClick={logGewicht}>Eintragen</button>
                </div>
              </div>
            </div>
            {hasHistory && (
              <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 60, display: 'block' }}>
                <polyline points={points} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
                {recent.map((e, i) => (
                  <circle key={i} cx={px(i)} cy={py(e.kg)} r="3" fill="var(--accent)" />
                ))}
              </svg>
            )}
            {hasHistory && (
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--text2)', marginTop: 6 }}>
                <span>{new Date(recent[0].datum).toLocaleDateString('de-DE', { day: 'numeric', month: 'short' })}</span>
                <span>{new Date(recent[recent.length-1].datum).toLocaleDateString('de-DE', { day: 'numeric', month: 'short' })}</span>
              </div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// ─── Lebensmittel ──────────────────────────────────────────────────────────
function LebensmittelForm({ initial, onSave, onClose }) {
  const [form, setForm] = useState(initial || {
    name: '', kategorie: 'Protein', kalorien: '', protein: '', kh: '', fett: '', einheit: 'g'
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const save = () => {
    if (!form.name || !form.kalorien) return;
    onSave({ ...form, kalorien: +form.kalorien, protein: +form.protein||0, kh: +form.kh||0, fett: +form.fett||0 });
  };
  return (
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-title">{initial ? 'Lebensmittel bearbeiten' : 'Neues Lebensmittel'}</div>
        <div className="form-group"><label>Name</label><input value={form.name} onChange={e => set('name', e.target.value)} placeholder="z.B. Hähnchenbrust" /></div>
        <div className="grid-2">
          <div className="form-group"><label>Kategorie</label>
            <select value={form.kategorie} onChange={e => set('kategorie', e.target.value)}>
              {KATEGORIEN.map(k => <option key={k}>{k}</option>)}
            </select>
          </div>
          <div className="form-group"><label>Einheit</label>
            <select value={form.einheit} onChange={e => set('einheit', e.target.value)}>
              <option value="g">Gramm (g)</option>
              <option value="ml">Milliliter (ml)</option>
              <option value="stk">Stück</option>
            </select>
          </div>
        </div>
        <div className="text-sm text-muted mb-16" style={{ marginBottom: 12 }}>Nährwerte pro 100{form.einheit}</div>
        <div className="grid-4">
          {[['kalorien','Kalorien (kcal)'],['protein','Protein (g)'],['kh','Kohlenhydrate (g)'],['fett','Fett (g)']].map(([k,l]) => (
            <div className="form-group" key={k}><label>{l}</label><input type="number" value={form[k]} onChange={e => set(k, e.target.value)} placeholder="0" /></div>
          ))}
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Abbrechen</button>
          <button className="btn btn-primary" onClick={save}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

function Lebensmittel({ data, setData }) {
  const [modal, setModal] = useState(null); // null | 'new' | {edit item}
  const [search, setSearch] = useState('');
  const [filterKat, setFilterKat] = useState('Alle');

  const filtered = data.lebensmittel.filter(lm => {
    const matchSearch = lm.name.toLowerCase().includes(search.toLowerCase());
    const matchKat = filterKat === 'Alle' || lm.kategorie === filterKat;
    return matchSearch && matchKat;
  });

  const save = (form) => {
    if (modal === 'new') {
      const id = Date.now();
      setData(d => ({ ...d, lebensmittel: [...d.lebensmittel, { ...form, id }] }));
    } else {
      setData(d => ({ ...d, lebensmittel: d.lebensmittel.map(l => l.id === modal.id ? { ...form, id: l.id } : l) }));
    }
    setModal(null);
  };

  const del = (id) => {
    if (!confirm('Lebensmittel löschen?')) return;
    setData(d => ({ ...d, lebensmittel: d.lebensmittel.filter(l => l.id !== id) }));
  };

  return (
    <div>
      {modal && <LebensmittelForm initial={modal !== 'new' ? modal : null} onSave={save} onClose={() => setModal(null)} />}
      <div className="row-between mb-24">
        <div className="page-title">Lebensmittel</div>
        <button className="btn btn-primary" onClick={() => setModal('new')}><Icon name="plus" /> Hinzufügen</button>
      </div>
      <div className="card mb-24">
        <div className="row gap-8">
          <input style={{ flex: 1 }} placeholder="Suchen..." value={search} onChange={e => setSearch(e.target.value)} />
          <select value={filterKat} onChange={e => setFilterKat(e.target.value)} style={{ width: 160 }}>
            <option value="Alle">Alle Kategorien</option>
            {KATEGORIEN.map(k => <option key={k}>{k}</option>)}
          </select>
        </div>
      </div>
      <div className="card">
        {filtered.length === 0 ? (
          <div className="empty">Keine Lebensmittel gefunden</div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Kategorie</th>
                <th>Kalorien</th>
                <th>Protein</th>
                <th>Kohlenhydrate</th>
                <th>Fett</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(lm => (
                <tr key={lm.id}>
                  <td style={{ fontWeight: 500 }}>{lm.name}</td>
                  <td><span className="badge badge-accent">{lm.kategorie}</span></td>
                  <td>{lm.kalorien} kcal</td>
                  <td>{lm.protein}g</td>
                  <td>{lm.kh}g</td>
                  <td>{lm.fett}g</td>
                  <td>
                    <div className="row gap-8">
                      <button className="btn btn-ghost btn-sm btn-icon" onClick={() => setModal(lm)}><Icon name="edit" size={14} /></button>
                      <button className="btn btn-danger btn-sm btn-icon" onClick={() => del(lm.id)}><Icon name="trash" size={14} /></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ─── Rezepte ───────────────────────────────────────────────────────────────
function RezeptForm({ initial, lebensmittel, onSave, onClose }) {
  const [form, setForm] = useState(initial || {
    name: '', beschreibung: '', anleitung: '', portionen: 1, zutaten: []
  });
  const [selLm, setSelLm] = useState('');
  const [selMenge, setSelMenge] = useState('100');
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const addZutat = () => {
    if (!selLm) return;
    const id = parseInt(selLm);
    if (form.zutaten.find(z => z.lmId === id)) return;
    setForm(f => ({ ...f, zutaten: [...f.zutaten, { lmId: id, menge: parseInt(selMenge)||100 }] }));
    setSelLm('');
    setSelMenge('100');
  };
  const removeZutat = (lmId) => setForm(f => ({ ...f, zutaten: f.zutaten.filter(z => z.lmId !== lmId) }));
  const updateMenge = (lmId, menge) => setForm(f => ({
    ...f, zutaten: f.zutaten.map(z => z.lmId === lmId ? { ...z, menge: parseInt(menge)||0 } : z)
  }));

  const nw = calcRezeptNaehrwerte(form, lebensmittel);

  return (
    <div className="modal-overlay">
      <div className="modal" style={{ maxWidth: 600 }}>
        <div className="modal-title">{initial ? 'Rezept bearbeiten' : 'Neues Rezept'}</div>
        <div className="grid-2">
          <div className="form-group"><label>Name</label><input value={form.name} onChange={e => set('name', e.target.value)} placeholder="Rezeptname" /></div>
          <div className="form-group"><label>Portionen</label><input type="number" min="1" value={form.portionen} onChange={e => set('portionen', +e.target.value||1)} /></div>
        </div>
        <div className="form-group"><label>Kurzbeschreibung</label><input value={form.beschreibung} onChange={e => set('beschreibung', e.target.value)} /></div>

        <div className="card-title">Zutaten</div>
        <div className="row gap-8 mb-16">
          <select style={{ flex: 1 }} value={selLm} onChange={e => setSelLm(e.target.value)}>
            <option value="">Lebensmittel wählen...</option>
            {lebensmittel.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}

                <input style={{ width: 70 }} type="number" value={z.menge} onChange={e => updateMenge(z.lmId, e.target.value)} />
                <span className="text-sm text-muted">{lm.einheit}</span>

            <div className="macro-chip">Kcal: <span>{Math.round(nw.kalorien)}</span></div>
            <div className="macro-chip">P: <span>{Math.round(nw.protein)}g</span></div>
            <div className="macro-chip">KH: <span>{Math.round(nw.kh)}g</span></div>
            <div className="macro-chip">F: <span>{Math.round(nw.fett)}g</span></div>
            <div className="text-sm text-muted" style={{ padding: '4px 0' }}>pro Portion</div>
          </div>
        )}
        <div className="form-group"><label>Zubereitung</label><textarea value={form.anleitung} onChange={e => set('anleitung', e.target.value)} placeholder="Schritte..." /></div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Abbrechen</button>
          <button className="btn btn-primary" onClick={() => form.name && onSave(form)}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

function Rezepte({ data, setData }) {
  const [modal, setModal] = useState(null);
  const [detail, setDetail] = useState(null);

  const save = (form) => {
    if (modal === 'new') {
      setData(d => ({ ...d, rezepte: [...d.rezepte, { ...form, id: Date.now() }] }));
    } else {
      setData(d => ({ ...d, rezepte: d.rezepte.map(r => r.id === modal.id ? { ...form, id: r.id } : r) }));
    }
    setModal(null);
  };

  const del = (id) => {
    if (!confirm('Rezept löschen?')) return;
    setData(d => ({ ...d, rezepte: d.rezepte.filter(r => r.id !== id) }));
    if (detail?.id === id) setDetail(null);
  };

  return (
    <div>
      {modal && <RezeptForm initial={modal !== 'new' ? modal : null} lebensmittel={data.lebensmittel} onSave={save} onClose={() => setModal(null)} />}

// ─── Wochenplan ────────────────────────────────────────────────────────────
function AddMealModal({ date, mahlzeit, data, onAdd, onClose }) {
  const [type, setType] = useState('rezept');
  const [selId, setSelId] = useState('');
  const [menge, setMenge] = useState('1');

  const items = type === 'rezept' ? data.rezepte : data.lebensmittel;
  const selected = items.find(x => x.id === parseInt(selId));

  let preview = null;
  if (selected) {
    if (type === 'rezept') {
      const nw = calcRezeptNaehrwerte(selected, data.lebensmittel);
      const f = parseFloat(menge)||1;
      preview = { kcal: Math.round(nw.kalorien * f), prot: Math.round(nw.protein * f) };
    } else {
      const f = (parseFloat(menge)||0) / 100;
      preview = { kcal: Math.round(selected.kalorien * f), prot: Math.round(selected.protein * f) };
    }
  }

  const add = () => {
    if (!selId) return;
    onAdd({ type, id: parseInt(selId), menge: parseFloat(menge)||1 });
    onClose();
  };

  return (
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-title">Mahlzeit hinzufügen</div>
        <div className="text-sm text-muted mb-16">{mahlzeit} · {new Date(date + 'T12:00:00').toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'short' })}</div>
        <div className="row gap-8 mb-16">
          {['rezept','lm'].map(t => (
            <button key={t} className={`btn ${type===t?'btn-primary':'btn-ghost'}`} onClick={() => { setType(t); setSelId(''); }}>
              {t === 'rezept' ? 'Rezept' : 'Lebensmittel'}
            </button>
          ))}
        </div>
        <div className="form-group">
          <label>{type === 'rezept' ? 'Rezept' : 'Lebensmittel'} wählen</label>
          <select value={selId} onChange={e => setSelId(e.target.value)}>
            <option value="">-- auswählen --</option>
            {items.map(x => <option key={x.id} value={x.id}>{x.name}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label>{type === 'rezept' ? 'Portionen' : 'Menge (g)'}</label>
          <input type="number" value={menge} onChange={e => setMenge(e.target.value)} min="0.5" step={type==='rezept'?'0.5':'10'} />
        </div>
        {preview && (
          <div className="macro-row mb-16">
            <div className="macro-chip">Kcal: <span>{preview.kcal}</span></div>
            <div className="macro-chip">Protein: <span>{preview.prot}g</span></div>
          </div>
        )}
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Abbrechen</button>
          <button className="btn btn-primary" onClick={add}>Hinzufügen</button>
        </div>
      </div>
    </div>
  );
}

function Wochenplan({ data, setData }) {
  const [weekOffset, setWeekOffset] = useState(0);
  const [addModal, setAddModal] = useState(null); // { date, mahlzeit }
  const dates = getWeekDates(weekOffset);
  const today = new Date().toISOString().split('T')[0];

  const addEntry = ({ type, id, menge }) => {
    const { date, mahlzeit } = addModal;
    setData(d => {
      const plan = { ...d.mahlzeitenplan };
      if (!plan[date]) plan[date] = {};
      if (!plan[date][mahlzeit]) plan[date][mahlzeit] = [];
      plan[date][mahlzeit] = [...plan[date][mahlzeit], { type, id, menge }];
      return { ...d, mahlzeitenplan: plan };
    });
  };

  const removeEntry = (date, mahlzeit, idx) => {
    setData(d => {
      const plan = { ...d.mahlzeitenplan };
      plan[date] = { ...plan[date] };
      plan[date][mahlzeit] = plan[date][mahlzeit].filter((_, i) => i !== idx);
      return { ...d, mahlzeitenplan: plan };
    });
  };

  const getDayKcal = (date) => {
    const meals = data.mahlzeitenplan[date] || {};
    let total = 0;
    for (const slot of Object.values(meals)) {
      for (const e of (slot||[])) {
        if (e.type === 'rezept') {
          const r = data.rezepte.find(x => x.id === e.id);
          if (r) { const n = calcRezeptNaehrwerte(r, data.lebensmittel); total += n.kalorien * e.menge; }
        } else {
          const l = data.lebensmittel.find(x => x.id === e.id);
          if (l) total += l.kalorien * e.menge / 100;
        }
      }
    }
    return Math.round(total);
  };

  const weekStart = new Date(dates[0] + 'T12:00:00').toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
  const weekEnd = new Date(dates[6] + 'T12:00:00').toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });

  return (
    <div>
      {addModal && <AddMealModal {...addModal} data={data} onAdd={addEntry} onClose={() => setAddModal(null)} />}
      <div className="row-between mb-24">
        <div className="page-title">Wochenplan</div>
        <div className="row gap-8">
          <button className="btn btn-ghost btn-icon" onClick={() => setWeekOffset(o => o-1)}><Icon name="chevLeft" /></button>
          <span className="text-sm" style={{ minWidth: 160, textAlign: 'center' }}>{weekStart} – {weekEnd}</span>
          <button className="btn btn-ghost btn-icon" onClick={() => setWeekOffset(o => o+1)}><Icon name="chevRight" /></button>
          {weekOffset !== 0 && <button className="btn btn-ghost btn-sm" onClick={() => setWeekOffset(0)}>Heute</button>}
        </div>
      </div>
      <div className="week-grid-wrap">
      <div className="week-grid">
        {dates.map((date, di) => {
          const kcal = getDayKcal(date);
          const isToday = date === today;
          return (
            <div key={date} className="day-col" style={{ border: isToday ? '1px solid var(--accent)' : '1px solid var(--border)' }}>
              <div className="day-header" style={{ color: isToday ? 'var(--accent)' : undefined }}>
                <div>{WOCHENTAGE[di]}</div>
                <div style={{ fontSize: 10, marginTop: 2 }}>{new Date(date+'T12:00:00').getDate()}.{new Date(date+'T12:00:00').getMonth()+1}.</div>
                {kcal > 0 && <div style={{ fontSize: 10, color: 'var(--accent)', marginTop: 2 }}>{kcal} kcal</div>}
              </div>
              {MAHLZEITEN.map(mahlzeit => {
                const entries = (data.mahlzeitenplan[date]?.[mahlzeit]) || [];
                return (
                  <div key={mahlzeit} className="meal-slot">
                    <div className="meal-slot-label">{mahlzeit.substring(0,3)}</div>
                    {entries.map((e, i) => {
                      let name = '?';
                      if (e.type === 'rezept') { const r = data.rezepte.find(x => x.id === e.id); if (r) name = r.name; }
                      else { const l = data.lebensmittel.find(x => x.id === e.id); if (l) name = l.name; }
                      return (
                        <div key={i} className="meal-entry" onClick={() => removeEntry(date, mahlzeit, i)} title="Klicken zum Entfernen">
                          {name.length > 12 ? name.substring(0,12)+'…' : name}
                        </div>
                      );
                    })}
                    <button className="add-meal-btn" onClick={() => setAddModal({ date, mahlzeit })}>+</button>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
      </div>{/* week-grid-wrap */}
      <div className="text-sm text-muted" style={{ marginTop: 12 }}>Tipp: Klicke auf eine Mahlzeit um sie zu entfernen.</div>
    </div>
  );
}

// ─── Einkaufsliste ─────────────────────────────────────────────────────────
function Einkaufsliste({ data, setData }) {
  const [newItem, setNewItem] = useState('');
  const [newMenge, setNewMenge] = useState('');
  const [genWeek, setGenWeek] = useState(0);

  const toggle = (id) => {
    setData(d => ({ ...d, einkaufsliste: d.einkaufsliste.map(x => x.id === id ? { ...x, done: !x.done } : x) }));
  };
  const del = (id) => setData(d => ({ ...d, einkaufsliste: d.einkaufsliste.filter(x => x.id !== id) }));
  const clearDone = () => setData(d => ({ ...d, einkaufsliste: d.einkaufsliste.filter(x => !x.done) }));

  const addManual = () => {
    if (!newItem.trim()) return;
    setData(d => ({ ...d, einkaufsliste: [...d.einkaufsliste, { id: Date.now(), name: newItem, menge: newMenge, done: false, source: 'manuell' }] }));
    setNewItem('');
    setNewMenge('');
  };

  const generateFromPlan = () => {
    const dates = getWeekDates(genWeek);
    const needed = {};
    for (const date of dates) {
      const meals = data.mahlzeitenplan[date] || {};
      for (const slot of Object.values(meals)) {
        for (const e of (slot||[])) {
          if (e.type === 'rezept') {
            const r = data.rezepte.find(x => x.id === e.id);
            if (r) {
              for (const z of r.zutaten) {
                const lm = data.lebensmittel.find(l => l.id === z.lmId);
                if (lm) {
                  const key = lm.id;
                  needed[key] = (needed[key] || { name: lm.name, einheit: lm.einheit, menge: 0 });
                  needed[key].menge += z.menge * e.menge / (r.portionen||1);
                }
              }
            }
          } else {
            const lm = data.lebensmittel.find(x => x.id === e.id);
            if (lm) {
              const key = lm.id;
              needed[key] = (needed[key] || { name: lm.name, einheit: lm.einheit, menge: 0 });
              needed[key].menge += e.menge;
            }
          }
        }
      }
    }
    const newItems = Object.values(needed).map(x => ({
      id: Date.now() + Math.random(),
      name: x.name,
      menge: `${Math.round(x.menge)}${x.einheit}`,
      done: false,
      source: 'plan'
    }));
    if (!newItems.length) { alert('Keine Mahlzeiten im ausgewählten Zeitraum.'); return; }
    setData(d => ({ ...d, einkaufsliste: [...d.einkaufsliste, ...newItems] }));
  };

  const { einkaufsliste } = data;
  const open = einkaufsliste.filter(x => !x.done);
  const done = einkaufsliste.filter(x => x.done);

  const weekDates = getWeekDates(genWeek);
  const weekLabel = `${new Date(weekDates[0]+'T12:00:00').toLocaleDateString('de-DE',{day:'numeric',month:'short'})} – ${new Date(weekDates[6]+'T12:00:00').toLocaleDateString('de-DE',{day:'numeric',month:'short'})}`;

  return (
    <div>
      <div className="row-between mb-24">
        <div className="page-title">Einkaufsliste</div>
        {done.length > 0 && <button className="btn btn-ghost btn-sm" onClick={clearDone}>Erledigtes löschen ({done.length})</button>}
      </div>

      <div className="grid-2 mb-24">
        <div className="card">
          <div className="card-title">Manuell hinzufügen</div>
          <div className="row gap-8">
            <input style={{ flex: 1 }} placeholder="Artikel..." value={newItem} onChange={e => setNewItem(e.target.value)} onKeyDown={e => e.key === 'Enter' && addManual()} />
            <input style={{ width: 100 }} placeholder="Menge..." value={newMenge} onChange={e => setNewMenge(e.target.value)} />
            <button className="btn btn-primary" onClick={addManual}><Icon name="plus" /></button>
          </div>
        </div>
        <div className="card">
          <div className="card-title">Aus Wochenplan generieren</div>
          <div className="row gap-8">
            <button className="btn btn-ghost btn-icon" onClick={() => setGenWeek(w => w-1)}><Icon name="chevLeft" size={14} /></button>
            <span className="text-sm" style={{ flex: 1, textAlign: 'center' }}>{weekLabel}</span>
            <button className="btn btn-ghost btn-icon" onClick={() => setGenWeek(w => w+1)}><Icon name="chevRight" size={14} /></button>
            <button className="btn btn-primary" onClick={generateFromPlan}>Generieren</button>
          </div>
        </div>
      </div>

      <div className="card">
        {einkaufsliste.length === 0 ? (
          <div className="empty">Einkaufsliste ist leer</div>
        ) : (
          <>
            {open.map(item => (
              <div key={item.id} className="shopping-item">
                <div className={`shopping-check${item.done?' checked':''}`} onClick={() => toggle(item.id)}>
                  {item.done && <Icon name="check" size={12} />}
                </div>
                <span style={{ flex: 1 }}>{item.name}</span>
                {item.menge && <span className="chip">{item.menge}</span>}
                {item.source === 'plan' && <span className="badge badge-accent">Plan</span>}
                <button className="btn btn-danger btn-sm btn-icon" onClick={() => del(item.id)}><Icon name="trash" size={12} /></button>
              </div>
            ))}
            {done.length > 0 && <>
              <hr className="divider" />
              {done.map(item => (
                <div key={item.id} className="shopping-item done">
                  <div className="shopping-check checked" onClick={() => toggle(item.id)}><Icon name="check" size={12} /></div>
                  <span style={{ flex: 1 }}>{item.name}</span>
                  {item.menge && <span className="chip">{item.menge}</span>}
                  <button className="btn btn-danger btn-sm btn-icon" onClick={() => del(item.id)}><Icon name="trash" size={12} /></button>
                </div>
              ))}
            </>}
          </>
        )}
      </div>
    </div>
  );
}

// ─── Settings ──────────────────────────────────────────────────────────────
function Settings({ data, setData }) {
  const [form, setForm] = useState(data.settings);
  const set = (k, v) => setForm(f => ({ ...f, [k]: +v||0 }));
  const save = () => { setData(d => ({ ...d, settings: form })); alert('Gespeichert!'); };

  const tdee = form.kalorienziel;
  const fromMacros = form.proteinZiel * 4 + form.kohlenhydrateZiel * 4 + form.fettZiel * 9;
  const diff = fromMacros - tdee;

  return (
    <div>
      <div className="page-title mb-24">Einstellungen</div>
      <div className="card" style={{ maxWidth: 500 }}>
        <div className="card-title">Kalorienziel & Makros</div>
        <div className="form-group">
          <label>Tägliches Kalorienziel (kcal)</label>
          <input type="number" value={form.kalorienziel} onChange={e => set('kalorienziel', e.target.value)} />
        </div>
        <div className="form-group">
          <label>Proteinziel (g/Tag)</label>
          <input type="number" value={form.proteinZiel} onChange={e => set('proteinZiel', e.target.value)} />
        </div>
        <div className="form-group">
          <label>Kohlenhydrate-Ziel (g/Tag)</label>
          <input type="number" value={form.kohlenhydrateZiel} onChange={e => set('kohlenhydrateZiel', e.target.value)} />
        </div>
        <div className="form-group">
          <label>Fettziel (g/Tag)</label>
          <input type="number" value={form.fettZiel} onChange={e => set('fettZiel', e.target.value)} />
        </div>
        <div className="card" style={{ marginBottom: 16, background: 'var(--surface2)' }}>
          <div className="text-sm">Kalorien aus Makros: <strong>{fromMacros} kcal</strong></div>
          <div className="text-sm" style={{ marginTop: 4, color: Math.abs(diff) > 50 ? 'var(--yellow)' : 'var(--green)' }}>
            {Math.abs(diff) < 10 ? '✓ Makros stimmen überein' : `${diff > 0 ? '+' : ''}${diff} kcal Differenz zu deinem Ziel`}
          </div>
        </div>
        <button className="btn btn-primary" onClick={save}>Speichern</button>
      </div>
      <div className="card" style={{ maxWidth: 500, marginTop: 16 }}>
        <div className="card-title">Daten</div>
        <div className="text-sm text-muted" style={{ marginBottom: 12 }}>
          Alle Daten werden lokal in deinem Browser gespeichert. Exportiere ein Backup um es auf einem anderen Gerät (z.B. Handy) zu importieren.
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <button className="btn btn-ghost" onClick={() => {
            const ts = new Date().toISOString().split('T')[0];
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `tracker-backup-${ts}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
          }}>Backup exportieren</button>
          <button className="btn btn-ghost" onClick={() => document.getElementById('import-file-input').click()}>
            Backup importieren
          </button>
          <input id="import-file-input" type="file" accept=".json,application/json" style={{ display: 'none' }}
            onChange={e => {
              const file = e.target.files?.[0];
              e.target.value = '';
              if (!file) return;
              if (file.size > 5 * 1024 * 1024) { alert('Datei zu groß (max. 5 MB)'); return; }
              const reader = new FileReader();
              reader.onload = ev => {
                try {
                  const raw = JSON.parse(ev.target.result);
                  const validated = validateImport(raw);
                  if (confirm('Alle aktuellen Daten werden ersetzt. Fortfahren?')) {
                    setData(validated);
                  }
                } catch (err) {
                  alert('Import fehlgeschlagen: ' + (err.message || 'Ungültige Datei'));
                }
              };
              reader.onerror = () => alert('Datei konnte nicht gelesen werden');
              reader.readAsText(file, 'utf-8');
            }}
          />
          <button className="btn btn-danger" onClick={() => {
            if (confirm('Alle Daten löschen?')) { localStorage.removeItem(STORAGE_KEY); window.location.reload(); }
          }}>Alle Daten löschen</button>
        </div>
      </div>
    </div>
  );
}

// ─── Kalkulator ────────────────────────────────────────────────────────────
function Kalkulator({ data, setData }) {
  const [form, setForm] = useState({
    geschlecht: 'männlich',
    alter: 22,
    groesse: 180,
    gewicht: 85,
    trainingsphase: 'saison',
    ruhetage: 3,
    trainingstage: 3,
    wettkampftage: 1,
    ziel: 'abnehmen',
    wochendefizit: 2000,
  });
  const [result, setResult] = useState(null);

  const set = (k, v) => setForm(f => {
    const next = { ...f, [k]: v };
    // Tage müssen zusammen 7 ergeben — restliche Tage automatisch anpassen
    if (['ruhetage','trainingstage','wettkampftage'].includes(k)) {
      const val = Math.max(0, Math.min(7, +v));
      next[k] = val;
      const others = ['ruhetage','trainingstage','wettkampftage'].filter(x => x !== k);
      const used = val + next[others[0]] + next[others[1]];
      if (used > 7) {
        const over = used - 7;
        // kürze den größten der anderen
        const [a, b] = others.sort((x,y) => next[y] - next[x]);
        next[a] = Math.max(0, next[a] - over);
      }
    }
    return next;
  });

  const PHASEN = {
    offseason:    { label: 'Off-Season',     extra: -150 },
    vorbereitung: { label: 'Vorbereitung',   extra: +100 },
    saison:       { label: 'Saison',         extra: 0    },
    wettkampf:    { label: 'Wettkampfphase', extra: +200 },
  };

  // Kalorien pro Tag je Tagtyp (TDEE + Phasen-Offset + Tagtyp-Offset)
  const TAGOFFSET = { ruhe: -200, training: 0, wettkampf: +300 };

  const totalTage = +form.ruhetage + +form.trainingstage + +form.wettkampftage;

  const calc = () => {
    const { geschlecht, alter, groesse, gewicht, trainingsphase, ruhetage, trainingstage, wettkampftage, ziel, wochendefizit } = form;
    const g = +gewicht, h = +groesse, a = +alter;

    const bmr = geschlecht === 'männlich'
      ? 10 * g + 6.25 * h - 5 * a + 5
      : 10 * g + 6.25 * h - 5 * a - 161;

    // TDEE: Aktivitätsfaktor aus der Tagmischung ableiten
    // Ruhe=1.2, Training=1.55, Wettkampf=1.725 — gewichteter Schnitt
    const aktFaktoren = { ruhe: 1.2, training: 1.55, wettkampf: 1.725 };
    const gewAkt = (+ruhetage * aktFaktoren.ruhe + +trainingstage * aktFaktoren.training + +wettkampftage * aktFaktoren.wettkampf) / 7;
    const tdee = Math.round(bmr * gewAkt);
    const phasenExtra = PHASEN[trainingsphase].extra;

    // Kalorien pro Tagtyp (Erhaltung)
    const kcalRuhe     = Math.round(tdee + phasenExtra + TAGOFFSET.ruhe);
    const kcalTraining = Math.round(tdee + phasenExtra + TAGOFFSET.training);
    const kcalWettkampf= Math.round(tdee + phasenExtra + TAGOFFSET.wettkampf);

    // Wöchentlicher Erhaltungsbedarf
    const wocheErhalt = +ruhetage * kcalRuhe + +trainingstage * kcalTraining + +wettkampftage * kcalWettkampf;

    // Wochendefizit/-überschuss verteilen: proportional zum Tagtyp (weniger an Ruhetagen kürzen)
    const zielMod = ziel === 'halten' ? 0 : ziel === 'abnehmen' ? -1 : +1;
    const wochenAnpassung = zielMod * +wochendefizit;

    // Defizit gleichmäßig pro Tag verteilen
    const defProTag = Math.round(wochenAnpassung / 7);

    const zielRuhe      = kcalRuhe      + defProTag;
    const zielTraining  = kcalTraining  + defProTag;
    const zielWettkampf = kcalWettkampf + defProTag;

    const wocheZiel = +ruhetage * zielRuhe + +trainingstage * zielTraining + +wettkampftage * zielWettkampf;
    const schnittProTag = Math.round(wocheZiel / 7);

    // Prognose: 1kg Fett ≈ 7700 kcal
    const kgProWoche = Math.round(Math.abs(wochenAnpassung) / 7700 * 100) / 100;
    const kgPro4Wochen = Math.round(kgProWoche * 4 * 10) / 10;

    // Makros (Schnitt aus der Woche)
    const protein = Math.round(g * 2.0);
    const fett = Math.round(schnittProTag * 0.25 / 9);
    const kh = Math.round((schnittProTag - protein * 4 - fett * 9) / 4);

    setResult({
      bmr: Math.round(bmr), tdee, wocheErhalt, wocheZiel, schnittProTag,
      zielRuhe, zielTraining, zielWettkampf,
      kgProWoche, kgPro4Wochen, protein, fett, kh,
      wochenAnpassung
    });
  };

  const apply = () => {
    if (!result) return;
    const { schnittProTag, protein, fett, kh } = result;
    setData(d => ({ ...d, settings: { ...d.settings, kalorienziel: schnittProTag, proteinZiel: protein, kohlenhydrateZiel: kh, fettZiel: fett } }));
    alert('Durchschnittliches Tagesziel übernommen!');
  };

  const InfoBox = ({ label, value, sub, color }) => (
    <div style={{ background: 'var(--surface2)', borderRadius: 2, padding: '12px 14px' }}>
      <div style={{ fontSize: 11, color: 'var(--text2)', marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 20, fontWeight: 700, color: color || 'var(--text)' }}>{value}</div>

    </div>
  );

  const DayCounter = ({ label, field, color }) => (

      <div style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 10 }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
        <button className="btn btn-ghost btn-icon btn-sm"

      </div>
      <div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 6 }}>Tage/Woche</div>

  return (
    <div>
      <div className="page-title mb-24">Wochenbedarf-Rechner</div>
      <div className="grid-2" style={{ alignItems: 'start' }}>

        {/* Eingaben */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div className="card">
            <div className="card-title">Körperdaten</div>
            <div className="grid-2">
              <div className="form-group">
                <label>Geschlecht</label>
                <select value={form.geschlecht} onChange={e => set('geschlecht', e.target.value)}>
                  <option value="männlich">Männlich</option>
                  <option value="weiblich">Weiblich</option>
                </select>
              </div>
              <div className="form-group">
                <label>Alter</label>
                <input type="number" value={form.alter} onChange={e => set('alter', e.target.value)} />
              </div>
              <div className="form-group">
                <label>Größe (cm)</label>
                <input type="number" value={form.groesse} onChange={e => set('groesse', e.target.value)} />
              </div>
              <div className="form-group">
                <label>Gewicht (kg)</label>
                <input type="number" value={form.gewicht} onChange={e => set('gewicht', e.target.value)} />
              </div>
            </div>
            <div className="form-group">
              <label>Trainingsphase</label>
              <select value={form.trainingsphase} onChange={e => set('trainingsphase', e.target.value)}>
                {Object.entries(PHASEN).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
          </div>

          <div className="card">
            <div className="card-title">Wie sieht deine typische Woche aus?</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 12 }}>
              <DayCounter label="Ruhetage" field="ruhetage" color="var(--text2)" />
              <DayCounter label="Trainingstage" field="trainingstage" color="var(--accent)" />
              <DayCounter label="Wettkampftage" field="wettkampftage" color="var(--yellow)" />
            </div>
            <div style={{
              display: 'flex', height: 8, borderRadius: 2, overflow: 'hidden', gap: 2, marginBottom: 8
            }}>
              {+form.ruhetage > 0 && <div style={{ flex: form.ruhetage, background: 'var(--border)', borderRadius: 2 }} />}
              {+form.trainingstage > 0 && <div style={{ flex: form.trainingstage, background: 'var(--accent)', borderRadius: 2 }} />}
              {+form.wettkampftage > 0 && <div style={{ flex: form.wettkampftage, background: 'var(--yellow)', borderRadius: 2 }} />}
            </div>
            {totalTage !== 7 && (

            </div>
            {form.ziel !== 'halten' && (

                </label>
                <input type="range" min="500" max="7000" step="250" value={form.wochendefizit}

                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--text2)', marginBottom: 8 }}>

          ) : (
            <div className="card" style={{ padding: 48, textAlign: 'center' }}>
              <div style={{ fontSize: 52, marginBottom: 16 }}></div>
              <div style={{ fontWeight: 600, marginBottom: 8 }}>Wochenbedarf berechnen</div>

                Gib deine Körperdaten ein und stelle ein, wie deine typische Woche aussieht — dann berechnen wir dein gesamtes Wochenbudget.

          )}
        </div>
      </div>
    </div>
  );
}

// ─── Training ──────────────────────────────────────────────────────────────
// Grundplan: Rugby/Athletik, Fullbody 2x/Woche, Oberkörper-Fokus
// aktiv: true = im aktuellen Plan, false = pausiert aber gespeichert
const DEFAULT_UEBUNGEN = [
  // Drücken
  { id: 1,  name: 'Bench Press',            kat: 'Drücken',   aktiv: true  },
  { id: 2,  name: 'Overhead Press',          kat: 'Drücken',   aktiv: true  },

  // Ziehen

  { id: 5,  name: 'Barbell Row',             kat: 'Ziehen',    aktiv: true  },
