  // Beine (minimal)
  { id: 8,  name: 'Romanian Deadlift',       kat: 'Beine',     aktiv: true  },
  { id: 9,  name: 'Bulgarian Split Squat',   kat: 'Beine',     aktiv: false },
  // Arme (Zusatz)
  { id: 10, name: 'Bicep Curls',             kat: 'Zusatz',    aktiv: false },
  { id: 11, name: 'Skull Crushers',          kat: 'Zusatz',    aktiv: false },
];

// Periodisierungs-Phasen
// 4-Wochen-Blöcke: bei 2x/Woche = 8 Sessions pro Phase, Körper adaptiert in ~3-4 Wochen
// Power kürzer (3 Wochen) — neural, nicht strukturell
const PHASEN_CONFIG = [
  { id: 'hypertrophie', name: 'Hypertrophie', wochen: 4, sets: 4, reps: '8–10', pct1rm: 0.68, steigerung: 2.5, interval: 2, beschreibung: 'Volumen aufbauen, Muskelmasse' },
  { id: 'kraft',        name: 'Kraft',        wochen: 4, sets: 5, reps: 5,      pct1rm: 0.78, steigerung: 2.5, interval: 1, beschreibung: 'Grundkraft, schwer & technisch sauber' },
  { id: 'power',        name: 'Power',        wochen: 3, sets: 4, reps: '3–5',  pct1rm: 0.85, steigerung: 2.5, interval: 1, beschreibung: 'Explosiv ausführen, Athletik' },
];

// Epley-Formel: schätzt 1RM aus Testgewicht + Reps
const calc1RM = (kg, reps) => reps === 1 ? kg : Math.round(kg * (1 + reps / 30));

// Rundet auf nächste 2.5kg
const round25 = (kg) => Math.round(kg / 2.5) * 2.5;

function Training({ data, setData }) {
  const td = data.training || { uebungen: DEFAULT_UEBUNGEN, sessions: [], plan: null };
  const uebungen = td.uebungen.length ? td.uebungen : DEFAULT_UEBUNGEN;
  const sessions = td.sessions || [];

  // Migriere altes Plan-Format (rm1 direkt im Plan → athletes-Array)
  let plan = td.plan || null;
  if (plan && plan.rm1 && !plan.athletes) {
    plan = { phaseIdx: plan.phaseIdx, startDate: plan.startDate, athletes: [{ name: 'Ich', rm1: plan.rm1 }] };
  }

  const [view, setView] = useState('overview');
  const [activeSession, setActiveSession] = useState(null);
  const [activeAthlete, setActiveAthlete] = useState(0);
  const [newUebung, setNewUebung] = useState('');
  const [newMuskel, setNewMuskel] = useState('');
  const [setupPhase, setSetupPhase] = useState(0);
  const [setupAthletes, setSetupAthletes] = useState([{ name: '', tests: {} }, { name: '', tests: {} }]);
  const [rm1Updates, setRm1Updates] = useState(null); // PR-Prompt nach Session

  const save = (next) => setData(d => ({ ...d, training: { ...td, ...next } }));

  // Letzter Log pro Übung + Athlet (unterstützt altes sessions.logs Format)
  const lastLog = (uebungId, athleteIdx = 0) => {
    for (let i = sessions.length - 1; i >= 0; i--) {
      const logs = sessions[i].athleteLogs?.[athleteIdx] ?? (athleteIdx === 0 ? sessions[i].logs : null);
      const log = logs?.find(l => l.uebungId === uebungId);
      if (log?.sets?.length) return { session: sessions[i], log };
    }
    return null;
  };

  const getPlanWeek = (p) => {
    if (!p) return 1;
    const days = Math.floor((new Date() - new Date(p.startDate)) / 86400000);
    return Math.max(1, Math.ceil((days + 1) / 7));
  };

  const isPlanComplete = (p) => p ? getPlanWeek(p) > PHASEN_CONFIG[p.phaseIdx].wochen : false;

  const planTarget = (uebungId, athleteIdx = 0) => {
    if (!plan) return null;
    const phase = PHASEN_CONFIG[plan.phaseIdx];
    const athlete = plan.athletes?.[athleteIdx];
    const rm1 = athlete?.rm1[uebungId];
    if (!rm1) return null;
    const woche = Math.min(getPlanWeek(plan), phase.wochen);
    const base = round25(rm1 * phase.pct1rm);
    return base + Math.floor((woche - 1) / phase.interval) * phase.steigerung;
  };

  const currentPhaseInfo = plan ? PHASEN_CONFIG[plan.phaseIdx] : null;
  const currentWeek = plan ? Math.min(getPlanWeek(plan), currentPhaseInfo.wochen) : null;
  const weeksLeft = plan ? (currentPhaseInfo.wochen - currentWeek + 1) : null;

  const startSession = () => {
    const date = new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
    const phase = plan ? PHASEN_CONFIG[plan.phaseIdx] : null;
    const athletes = plan?.athletes || [{ name: 'Ich', rm1: {} }];
    const athleteLogs = athletes.map((_, ai) =>
      uebungen.filter(u => u.aktiv !== false).map(u => {
        const target = planTarget(u.id, ai);
        const last = lastLog(u.id, ai);
        const defaultSets = phase
          ? Array(phase.sets).fill(null).map(() => ({ kg: target || '', reps: typeof phase.reps === 'number' ? phase.reps : '' }))
          : (last ? last.log.sets.map(s => ({ ...s })) : [{ kg: '', reps: '' }]);
        return { uebungId: u.id, sets: defaultSets, target };
      })
    );
    setActiveSession({ date, phaseIdx: plan?.phaseIdx, week: plan ? getPlanWeek(plan) : null, athleteLogs });
    setActiveAthlete(0);
    setView('session');
  };

  const updateSet = (li, si, field, val) => setActiveSession(prev => ({
    ...prev,
    athleteLogs: prev.athleteLogs.map((logs, ai) => ai !== activeAthlete ? logs :
      logs.map((l, i) => i !== li ? l : { ...l, sets: l.sets.map((s, j) => j !== si ? s : { ...s, [field]: val }) })
    )
  }));

  const addSet = (li) => setActiveSession(prev => ({
    ...prev,
    athleteLogs: prev.athleteLogs.map((logs, ai) => ai !== activeAthlete ? logs :
      logs.map((l, i) => { if (i !== li) return l; const last = l.sets[l.sets.length - 1] || { kg: '', reps: '' }; return { ...l, sets: [...l.sets, { ...last }] }; })
    )
  }));

  const removeSet = (li, si) => setActiveSession(prev => ({
    ...prev,
    athleteLogs: prev.athleteLogs.map((logs, ai) => ai !== activeAthlete ? logs :
      logs.map((l, i) => i !== li || l.sets.length <= 1 ? l : { ...l, sets: l.sets.filter((_, j) => j !== si) })
    )
  }));

  const saveSession = () => {
    const saved = { ...activeSession, savedAt: Date.now() };
    const newSessions = [...sessions, saved];

    // PR-Check: berechneter Epley > gespeicherter 1RM?
    const updates = [];
    if (plan) {
      plan.athletes.forEach((ath, ai) => {
        (activeSession.athleteLogs[ai] || []).forEach(log => {
          const validSets = log.sets.filter(s => s.kg && s.reps && +s.reps > 0);
          if (!validSets.length) return;
          const maxEpley = Math.max(...validSets.map(s => calc1RM(+s.kg, +s.reps)));
          const current = ath.rm1[log.uebungId] || 0;
          if (maxEpley > current) updates.push({ ai, uebungId: log.uebungId, oldRm1: current, newRm1: maxEpley });
        });
      });
    }

    save({ sessions: newSessions });
    if (updates.length) setRm1Updates(updates);
    setView('overview');
    setActiveSession(null);
  };

  const applyRm1Updates = (selected) => {
    const newAthletes = plan.athletes.map((ath, ai) => {
      const relevant = selected.filter(u => u.ai === ai);
      if (!relevant.length) return ath;
      const newRm1 = { ...ath.rm1 };
      relevant.forEach(u => { newRm1[u.uebungId] = u.newRm1; });
      return { ...ath, rm1: newRm1 };
    });
    save({ plan: { ...plan, athletes: newAthletes } });
    setRm1Updates(null);
  };

  const addUebung = () => {
    if (!newUebung.trim()) return;
    save({ uebungen: [...uebungen, { id: Date.now(), name: newUebung, kat: newMuskel || 'Sonstiges', aktiv: true }] });
    setNewUebung(''); setNewMuskel('');
  };

  const removeUebung = (id) => {
    if (!confirm('Übung löschen?')) return;
    save({ uebungen: uebungen.filter(u => u.id !== id) });
  };

  const startPlanSetup = () => {
    const existing = plan?.athletes || [];
    setSetupPhase(plan?.phaseIdx ?? 0);
    setSetupAthletes([
      { name: existing[0]?.name || '', tests: {} },
      { name: existing[1]?.name || '', tests: {} },
    ]);
    setView('planSetup');
  };

  const createPlan = () => {
    const filled = setupAthletes.filter(a => a.name.trim());
    if (!filled.length) return;
    const athletes = filled.map(a => {
      const rm1 = {};
      uebungen.forEach(u => { const t = a.tests[u.id]; if (t?.kg && t?.reps) rm1[u.id] = calc1RM(+t.kg, +t.reps); });
      return { name: a.name.trim(), rm1 };
    });
    save({ plan: { phaseIdx: setupPhase, startDate: new Date().toISOString().split('T')[0], athletes } });
    setView('overview');
  };

  const advancePhase = () => {
    const nextIdx = (plan.phaseIdx + 1) % PHASEN_CONFIG.length;
    save({ plan: { ...plan, phaseIdx: nextIdx, startDate: new Date().toISOString().split('T')[0] } });
  };

  // ── Plan Setup ────────────────────────────────────────────────────────────
  if (view === 'planSetup') {
    const phase = PHASEN_CONFIG[setupPhase];
    const [activeSetupAthlete, setActiveSetupAthlete] = React.useState(0);
    const curAth = setupAthletes[activeSetupAthlete];
    const setAthleteName = (i, name) => setSetupAthletes(prev => prev.map((a, idx) => idx === i ? { ...a, name } : a));
    const setAthTest = (ai, uid, field, val) => setSetupAthletes(prev => prev.map((a, idx) => idx !== ai ? a : {
      ...a, tests: { ...a.tests, [uid]: { ...(a.tests[uid] || {}), [field]: val } }
    }));

    return (
      <div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 28 }}>
          <button className="btn btn-ghost" onClick={() => setView('overview')}>← Zurück</button>
          <div>
            <div style={{ fontSize: 11, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: 1 }}>Trainingsplan erstellen</div>
            <div style={{ fontSize: 22, fontWeight: 700, marginTop: 2 }}>Startphase & Testwerte</div>
          </div>
        </div>

        {/* Athleten-Namen */}
        <div className="athlete-name-row" style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
          {[0, 1].map(i => (
            <div key={i} style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: 'var(--text2)', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 1 }}>
                {i === 0 ? 'Du' : 'Trainingspartner (optional)'}
              </div>
              <input value={setupAthletes[i].name} onChange={e => setAthleteName(i, e.target.value)}
                placeholder={i === 0 ? 'Dein Name' : 'Name Trainingspartner'}
                style={{ width: '100%' }} />
            </div>
          ))}
        </div>

        {/* Phasen-Auswahl */}
        <div className="phase-selector" style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
          {PHASEN_CONFIG.map((p, i) => (
            <div key={p.id} onClick={() => setSetupPhase(i)} style={{
              flex: 1, padding: '14px 16px', border: `1px solid ${setupPhase === i ? 'var(--accent)' : 'var(--border)'}`,
              cursor: 'pointer', background: setupPhase === i ? 'rgba(0,229,160,0.07)' : 'var(--surface)'
            }}>
              <div style={{ fontWeight: 700, color: setupPhase === i ? 'var(--accent)' : 'var(--text)', fontSize: 14 }}>{p.name}</div>
              <div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 4 }}>{p.sets}×{p.reps} · {p.wochen} Wo.</div>
              <div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 2 }}>{p.beschreibung}</div>
            </div>
          ))}
        </div>

        {/* Testwerte — Athlet-Tabs wenn beide Namen ausgefüllt */}
        {setupAthletes[1].name.trim() && (
          <div style={{ display: 'flex', gap: 4, marginBottom: 16 }}>
            {setupAthletes.map((a, i) => a.name.trim() && (
              <button key={i} onClick={() => setActiveSetupAthlete(i)} style={{
                padding: '6px 16px', border: `1px solid ${activeSetupAthlete === i ? 'var(--accent)' : 'var(--border)'}`,
                background: activeSetupAthlete === i ? 'rgba(0,229,160,0.07)' : 'var(--surface)',
                color: activeSetupAthlete === i ? 'var(--accent)' : 'var(--text2)', cursor: 'pointer', fontSize: 13
              }}>{a.name}</button>
            ))}
          </div>
        )}

        <div style={{ marginBottom: 8, fontSize: 12, color: 'var(--text2)' }}>
          Testgewicht + Reps eingeben → 1RM wird berechnet, Trainingsvorgaben für {phase.wochen} Wochen werden automatisch gesetzt.
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 24 }}>
          {uebungen.map(u => {
            const t = curAth.tests[u.id] || { kg: '', reps: '' };
            const rm1 = t.kg && t.reps ? calc1RM(+t.kg, +t.reps) : null;
            const target = rm1 ? round25(rm1 * phase.pct1rm) : null;
            return (
              <div key={u.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', background: 'var(--surface)', border: '1px solid var(--border)' }}>
                <div style={{ width: 156, fontWeight: 600, fontSize: 13 }}>{u.name}</div>
                <input type="number" placeholder="kg" value={t.kg}
                  onChange={e => setAthTest(activeSetupAthlete, u.id, 'kg', e.target.value)} style={{ width: 70 }} />
                <span style={{ fontSize: 12, color: 'var(--text2)' }}>×</span>
                <input type="number" placeholder="Reps" value={t.reps}
                  onChange={e => setAthTest(activeSetupAthlete, u.id, 'reps', e.target.value)} style={{ width: 62 }} />
                {rm1 ? (
                  <div style={{ marginLeft: 'auto', textAlign: 'right' }}>
                    <div style={{ fontSize: 11, color: 'var(--text2)' }}>1RM ≈ {rm1}kg</div>
                    <div style={{ fontSize: 13, color: 'var(--accent)', fontWeight: 700 }}>W1: {target}kg</div>
                  </div>
                ) : <div style={{ marginLeft: 'auto' }} />}
              </div>
            );
          })}
        </div>

        <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', padding: '12px' }}
          onClick={createPlan} disabled={!setupAthletes[0].name.trim()}>
          Plan erstellen
        </button>
      </div>
    );
  }

  // ── Session View ──────────────────────────────────────────────────────────
  if (view === 'session' && activeSession) {
    const phase = activeSession.phaseIdx != null ? PHASEN_CONFIG[activeSession.phaseIdx] : null;
    const athletes = plan?.athletes || [{ name: 'Ich' }];
    const multiAthlete = athletes.length > 1;
    const curLogs = activeSession.athleteLogs[activeAthlete] || [];

    return (
      <div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: multiAthlete ? 16 : 28 }}>
          <div>
            {phase && <div style={{ fontSize: 11, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 4 }}>{phase.name} · Woche {activeSession.week}</div>}
            <div style={{ fontSize: 22, fontWeight: 700 }}>{activeSession.date}</div>
          </div>
          <div style={{ display: 'flex', gap: 10 }}>
            <button className="btn btn-ghost" onClick={() => setView('overview')}>Abbrechen</button>
            <button className="btn btn-primary" onClick={saveSession}>Speichern</button>
          </div>
        </div>

        {/* Athlet-Tabs (nur bei mehreren Athleten) */}
        {multiAthlete && (
          <div style={{ display: 'flex', gap: 4, marginBottom: 20 }}>
            {athletes.map((a, i) => (
              <button key={i} onClick={() => setActiveAthlete(i)} style={{
                flex: 1, padding: '8px', border: `1px solid ${activeAthlete === i ? 'var(--accent)' : 'var(--border)'}`,
                background: activeAthlete === i ? 'rgba(0,229,160,0.07)' : 'var(--surface)',
                color: activeAthlete === i ? 'var(--accent)' : 'var(--text2)', cursor: 'pointer', fontWeight: activeAthlete === i ? 700 : 400, fontSize: 14
              }}>{a.name}</button>
            ))}
          </div>
        )}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {curLogs.map((log, li) => {
            const u = uebungen.find(x => x.id === log.uebungId);
            if (!u) return null;
            const last = lastLog(u.id, activeAthlete);
            return (
              <div key={log.uebungId} className="card">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{u.name}</div>
                  <div style={{ textAlign: 'right', fontSize: 12 }}>
                    {log.target && <div style={{ color: 'var(--accent)', fontWeight: 700 }}>Ziel: {log.target}kg × {phase?.reps}</div>}
                    {last && <div style={{ color: 'var(--text2)', marginTop: 2 }}>letztes Mal: {last.log.sets.map(s => `${s.kg}×${s.reps}`).join('  ')}</div>}
                  </div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {log.sets.map((set, si) => (
                    <div key={si} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontSize: 11, color: 'var(--text2)', width: 20, flexShrink: 0 }}>S{si+1}</span>
                      <input type="number" placeholder="kg" value={set.kg}
                        onChange={e => updateSet(li, si, 'kg', e.target.value)} style={{ width: 72 }} />
                      <span style={{ color: 'var(--text2)', fontSize: 13 }}>kg</span>
                      <input type="number" placeholder="Wdh" value={set.reps}
                        onChange={e => updateSet(li, si, 'reps', e.target.value)} style={{ width: 60 }} />
                      <span style={{ color: 'var(--text2)', fontSize: 13 }}>×</span>
                      {log.sets.length > 1 && (
                        <button onClick={() => removeSet(li, si)}
                          style={{ background: 'none', border: 'none', color: 'var(--text2)', cursor: 'pointer', fontSize: 18, lineHeight: 1, padding: '0 4px' }}>×</button>
                      )}
                    </div>
                  ))}
                </div>
                <button onClick={() => addSet(li)} style={{ marginTop: 10, background: 'none', border: '1px solid var(--border)', color: 'var(--text2)', fontSize: 12, padding: '5px 12px', cursor: 'pointer' }}>
                  + Satz
                </button>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Verlauf ───────────────────────────────────────────────────────────────
  if (view === 'verlauf') {
    const [verlaufAthlete, setVerlaufAthlete] = React.useState(0);
    const athletes = plan?.athletes || [];
    return (
      <div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20 }}>
          <button className="btn btn-ghost" onClick={() => setView('overview')}>← Zurück</button>
          <div style={{ fontSize: 22, fontWeight: 700 }}>Verlauf</div>
        </div>
        {athletes.length > 1 && (
          <div style={{ display: 'flex', gap: 4, marginBottom: 20 }}>
            {athletes.map((a, i) => (
              <button key={i} onClick={() => setVerlaufAthlete(i)} style={{
                padding: '6px 16px', border: `1px solid ${verlaufAthlete === i ? 'var(--accent)' : 'var(--border)'}`,
                background: verlaufAthlete === i ? 'rgba(0,229,160,0.07)' : 'var(--surface)',
                color: verlaufAthlete === i ? 'var(--accent)' : 'var(--text2)', cursor: 'pointer', fontSize: 13
              }}>{a.name}</button>
            ))}
          </div>
        )}
        {sessions.length === 0 ? (
          <div className="card" style={{ color: 'var(--text2)', padding: 40, textAlign: 'center' }}>Noch keine Sessions gespeichert.</div>
        ) : [...sessions].reverse().map((s, i) => {
          const phase = s.phaseIdx != null ? PHASEN_CONFIG[s.phaseIdx] : null;
          const logs = s.athleteLogs?.[verlaufAthlete] ?? (verlaufAthlete === 0 ? s.logs : []) ?? [];
          const hasData = logs.some(l => l.sets?.some(x => x.kg));
          if (!hasData) return null;
          return (
            <div key={i} className="card" style={{ marginBottom: 10 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
                <div style={{ fontWeight: 600 }}>{s.date}</div>
                {phase && <div style={{ fontSize: 11, color: 'var(--accent)' }}>{phase.name} · W{s.week}</div>}
              </div>
              {logs.filter(l => l.sets?.some(x => x.kg)).map(log => {
                const u = uebungen.find(u => u.id === log.uebungId);
                return (
                  <div key={log.uebungId} style={{ display: 'flex', justifyContent: 'space-between', padding: '5px 0', borderBottom: '1px solid var(--border)', fontSize: 13 }}>
                    <span style={{ color: 'var(--text2)' }}>{u?.name}</span>
                    <span>{log.sets.filter(s=>s.kg).map(s => `${s.kg}×${s.reps}`).join('  ')}</span>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    );
  }

  // ── Übersicht ─────────────────────────────────────────────────────────────
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 28, gap: 12, flexWrap: 'wrap' }}>
        <div style={{ fontSize: 22, fontWeight: 700 }}>Training</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <button className="btn btn-ghost" onClick={() => setView('verlauf')}>Verlauf</button>
          <button className="btn btn-ghost" onClick={startPlanSetup}>{plan ? 'Plan' : 'Plan erstellen'}</button>
          <button className="btn btn-primary" onClick={startSession}>Session starten</button>
        </div>
      </div>

      {/* PR-Update Prompt */}
      {rm1Updates && (() => {
        const [selected, setSelected] = React.useState(rm1Updates.map((_, i) => i));
        return (
          <div style={{ marginBottom: 20, padding: '16px', background: 'var(--surface)', border: '1px solid var(--yellow)' }}>
            <div style={{ fontWeight: 700, color: 'var(--yellow)', marginBottom: 8 }}>Neue Bestleistungen — 1RM aktualisieren?</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 14 }}>
              {rm1Updates.map((u, i) => {
                const ath = plan.athletes[u.ai];
                const ueb = uebungen.find(x => x.id === u.uebungId);
                const checked = selected.includes(i);
                return (
                  <div key={i} onClick={() => setSelected(s => checked ? s.filter(x => x !== i) : [...s, i])}
                    style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', fontSize: 13 }}>
                    <div style={{ width: 14, height: 14, border: `2px solid ${checked ? 'var(--accent)' : 'var(--border)'}`, background: checked ? 'var(--accent)' : 'transparent', flexShrink: 0 }} />
                    <span style={{ color: 'var(--text2)' }}>{ath?.name} · {ueb?.name}</span>
                    <span style={{ marginLeft: 'auto' }}>{u.oldRm1 > 0 ? `${u.oldRm1}kg` : '—'} → <strong style={{ color: 'var(--accent)' }}>{u.newRm1}kg</strong></span>
                  </div>
                );
              })}
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-ghost" onClick={() => setRm1Updates(null)}>Ignorieren</button>
              <button className="btn btn-primary" onClick={() => applyRm1Updates(rm1Updates.filter((_, i) => selected.includes(i)))}>
                Übernehmen ({selected.length})
              </button>
            </div>
          </div>
        );
      })()}

      {/* Aktiver Plan-Status */}
      {plan && (
        <div style={{ marginBottom: 20, padding: '16px', background: 'var(--surface)', border: `1px solid ${isPlanComplete(plan) ? 'var(--yellow)' : 'var(--border)'}` }}>
          {isPlanComplete(plan) ? (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontWeight: 700, color: 'var(--yellow)' }}>Phase abgeschlossen</div>
                <div style={{ fontSize: 13, color: 'var(--text2)', marginTop: 4 }}>
                  {currentPhaseInfo.name} — {currentPhaseInfo.wochen} Wochen erledigt. Bereit für die nächste Phase?
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button className="btn btn-ghost" onClick={startPlanSetup}>Neu testen</button>
                <button className="btn btn-primary" onClick={advancePhase}>
                  Weiter zu {PHASEN_CONFIG[(plan.phaseIdx + 1) % PHASEN_CONFIG.length].name}
                </button>
              </div>
            </div>
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontSize: 11, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: 1 }}>Aktuelle Phase</div>
                <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--accent)', marginTop: 2 }}>{currentPhaseInfo.name}</div>
                <div style={{ fontSize: 13, color: 'var(--text2)', marginTop: 2 }}>{currentPhaseInfo.sets}×{currentPhaseInfo.reps} Reps · {currentPhaseInfo.beschreibung}</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 28, fontWeight: 800 }}>W{currentWeek}<span style={{ fontSize: 14, color: 'var(--text2)', fontWeight: 400 }}> / {currentPhaseInfo.wochen}</span></div>
                <div style={{ fontSize: 12, color: 'var(--text2)' }}>{weeksLeft} Woche{weeksLeft !== 1 ? 'n' : ''} übrig</div>
              </div>
            </div>
          )}
          {/* Wochen-Fortschrittsbalken */}
          {!isPlanComplete(plan) && (
            <div style={{ background: 'var(--surface2)', height: 3, marginTop: 14 }}>
              <div style={{ height: '100%', background: 'var(--accent)', width: `${((currentWeek - 1) / currentPhaseInfo.wochen) * 100}%`, transition: 'width 0.3s' }} />
            </div>
          )}
        </div>
      )}

      {/* Übungen nach Kategorie */}
      {(() => {
        const kats = [...new Set(uebungen.map(u => u.kat || u.muskel || 'Sonstiges'))];
        return kats.map(kat => (
          <div key={kat} style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>{kat}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              {uebungen.filter(u => (u.kat || u.muskel || 'Sonstiges') === kat).map(u => {
                const aktiv = u.aktiv !== false;
                const toggleAktiv = () => save({ uebungen: uebungen.map(x => x.id === u.id ? { ...x, aktiv: !aktiv } : x) });
                const athletes = plan?.athletes || [];
                const multiAthlete = athletes.length > 1;
                return (
                  <div key={u.id} style={{
                    display: 'flex', alignItems: 'center', padding: '11px 14px',
                    background: 'var(--surface)', border: '1px solid var(--border)',
                    opacity: aktiv ? 1 : 0.45
                  }}>
                    <div onClick={toggleAktiv} style={{
                      width: 16, height: 16, border: `2px solid ${aktiv ? 'var(--accent)' : 'var(--border)'}`,
                      background: aktiv ? 'var(--accent)' : 'transparent',
                      marginRight: 12, cursor: 'pointer', flexShrink: 0
                    }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{u.name}</div>
                    </div>
                    <div style={{ textAlign: 'right', marginRight: 12 }}>
                      {aktiv && plan && (
                        <div style={{ display: 'flex', gap: 16 }}>
                          {athletes.map((ath, ai) => {
                            const target = planTarget(u.id, ai);
                            const last = lastLog(u.id, ai);
                            return (
                              <div key={ai} style={{ textAlign: 'right' }}>
                                {multiAthlete && <div style={{ fontSize: 10, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: 0.5 }}>{ath.name}</div>}
                                {target ? <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--accent)' }}>{target}kg <span style={{ fontSize: 11, color: 'var(--text2)', fontWeight: 400 }}>× {currentPhaseInfo?.reps}</span></div>
                                         : <div style={{ fontSize: 11, color: 'var(--text2)' }}>kein 1RM</div>}
                                {last && <div style={{ fontSize: 11, color: 'var(--text2)' }}>zuletzt: {last.log.sets.filter(s=>s.kg).map(s=>`${s.kg}×${s.reps}`).join(' ')}</div>}
                              </div>
                            );
                          })}
                        </div>
                      )}
                      {!plan && (() => { const last = lastLog(u.id); return last ? <div style={{ fontSize: 11, color: 'var(--text2)' }}>zuletzt: {last.log.sets.filter(s=>s.kg).map(s=>`${s.kg}×${s.reps}`).join(' ')}</div> : <div style={{ fontSize: 11, color: 'var(--text2)' }}>kein Eintrag</div>; })()}
                    </div>
                    <button onClick={() => removeUebung(u.id)}
                      style={{ background: 'none', border: 'none', color: 'var(--text2)', cursor: 'pointer', fontSize: 16, padding: '0 2px', opacity: 0.4 }}>×</button>
                  </div>
                );
              })}
            </div>
          </div>
        ));
      })()}

      {/* Übung hinzufügen */}
      <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
        <input placeholder="Übung hinzufügen..." value={newUebung} onChange={e => setNewUebung(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && addUebung()} style={{ flex: 2 }} />
        <input placeholder="Kategorie" value={newMuskel} onChange={e => setNewMuskel(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && addUebung()} style={{ flex: 1 }} />
        <button className="btn btn-primary" onClick={addUebung}>+</button>
      </div>
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────
const PAGES = [
  { id: 'dashboard', label: 'Dashboard', icon: 'home' },
  { id: 'lebensmittel', label: 'Lebensmittel', icon: 'food' },
  { id: 'rezepte', label: 'Rezepte', icon: 'recipe' },
  { id: 'training', label: 'Training', icon: 'dumbbell' },
  { id: 'plan', label: 'Wochenplan', icon: 'calendar' },
  { id: 'einkauf', label: 'Einkaufsliste', icon: 'cart' },
  { id: 'kalkulator', label: 'Kalkulator', icon: 'calc' },
  { id: 'settings', label: 'Einstellungen', icon: 'settings' },
];

function App() {
  const [page, setPage] = useState('dashboard');
  const [data, setDataRaw] = useState(loadData);

  const setData = useCallback((updater) => {
    setDataRaw(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveData(next);
      return next;
    });
  }, []);

  const pageProps = { data, setData };

  // Kurze Labels für die Bottom Nav (max 7 Zeichen)
  const BOTTOM_LABELS = {
    dashboard: 'Home', lebensmittel: 'Essen', rezepte: 'Rezepte',
    training: 'Training', plan: 'Plan', einkauf: 'Einkauf',
    kalkulator: 'Kalkul.', settings: 'Einst.'
  };

  return (
    <div id="app" style={{ display: 'flex', minHeight: '100vh', width: '100%' }}>
      {/* Desktop Sidebar */}
      <div className="sidebar">
        <div className="sidebar-logo">Ernährungs-Tracker</div>
        {PAGES.map(p => (
          <div key={p.id} className={`nav-item${page === p.id ? ' active' : ''}`} onClick={() => setPage(p.id)}>
            <Icon name={p.icon} />
            {p.label}
          </div>
        ))}
      </div>

      {/* Content */}
      <div className="main">
        {page === 'dashboard' && <Dashboard {...pageProps} />}
        {page === 'lebensmittel' && <Lebensmittel {...pageProps} />}
        {page === 'rezepte' && <Rezepte {...pageProps} />}
        {page === 'kalkulator' && <Kalkulator {...pageProps} />}
        {page === 'training' && <Training {...pageProps} />}
        {page === 'plan' && <Wochenplan {...pageProps} />}
        {page === 'einkauf' && <Einkaufsliste {...pageProps} />}
        {page === 'settings' && <Settings {...pageProps} />}
      </div>

      {/* Mobile Bottom Nav */}
      <div className="bottom-nav">
        {PAGES.map(p => (
          <div key={p.id} className={`bottom-nav-item${page === p.id ? ' active' : ''}`} onClick={() => setPage(p.id)}>
            <Icon name={p.icon} size={20} />
            <span>{BOTTOM_LABELS[p.id]}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
